name: arti-docker (build & push)

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force build even if no new upstream release"
        type: boolean
        default: false

  schedule:
    - cron: "0 * * * *"

  push:
    branches: ["master"]
    paths:
      - "Dockerfile"
      - ".github/workflows/arti-docker-build.yml"

concurrency:
  group: arti-docker-build
  cancel-in-progress: true

permissions:
  contents: write

env:
  IMAGE_NAME: whn0thacked/arti-docker

  UPSTREAM_PROJECT: tpo%2Fcore%2Farti
  UPSTREAM_REPO_URL: https://gitlab.torproject.org/tpo/core/arti
  UPSTREAM_CLONE_URL: https://gitlab.torproject.org/tpo/core/arti.git

  RUST_IMAGE: docker.io/library/rust:alpine
  DISTROLESS_IMAGE: gcr.io/distroless/static:nonroot

  STATE_FILE: .github/arti-docker/state.json

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch latest upstream release and compare with state
        id: check
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "${STATE_FILE}")"

          # ── read previous state ──
          prev_release_tag=""

          if [ -f "${STATE_FILE}" ]; then
            prev_release_tag="$(jq -r '.release_tag // ""' "${STATE_FILE}")"
          fi

          # ── GitLab: list releases, pick latest stable arti-v* ──
          releases_json="$(
            curl -fsSL \
              -H "Accept: application/json" \
              "https://gitlab.torproject.org/api/v4/projects/${UPSTREAM_PROJECT}/releases?per_page=50&order_by=released_at&sort=desc"
          )"

          release_json="$(
            echo "${releases_json}" | jq -r '
              [ .[] |
                select(.upcoming_release != true) |
                select(.tag_name | test("^arti-v[0-9]+\\.[0-9]+\\.[0-9]+$"))
              ] | first // empty
            '
          )"

          if [ -z "${release_json}" ] || [ "${release_json}" = "null" ]; then
            echo "::warning::No stable arti release found, falling back to latest arti-* release"
            release_json="$(
              echo "${releases_json}" | jq -r '
                [ .[] |
                  select(.upcoming_release != true) |
                  select(.tag_name | startswith("arti-"))
                ] | first // empty
              '
            )"
          fi

          if [ -z "${release_json}" ] || [ "${release_json}" = "null" ]; then
            echo "::error::No arti release found at all"
            exit 1
          fi

          release_tag="$(echo "${release_json}" | jq -r '.tag_name')"

          # ── resolve tag → commit SHA ──
          tag_json="$(
            curl -fsSL \
              -H "Accept: application/json" \
              "https://gitlab.torproject.org/api/v4/projects/${UPSTREAM_PROJECT}/repository/tags/${release_tag}"
          )"

          release_sha="$(echo "${tag_json}" | jq -r '.commit.id')"

          if [ -z "${release_sha}" ] || [ "${release_sha}" = "null" ]; then
            echo "::error::Cannot resolve SHA for tag ${release_tag}"
            exit 1
          fi

          # ── compare ──
          changed=false
          if [ -z "${prev_release_tag}" ] || [ "${prev_release_tag}" != "${release_tag}" ]; then
            changed=true
          fi

          short_sha="${release_sha:0:12}"
          semver="$(echo "${release_tag}" | sed -n 's/^arti-v//p')"
          docker_tag="$(echo "${release_tag}" | sed 's/[^a-zA-Z0-9._-]/-/g')"

          {
            echo "changed=${changed}"
            echo "release_tag=${release_tag}"
            echo "docker_tag=${docker_tag}"
            echo "semver=${semver}"
            echo "release_sha=${release_sha}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build decision (log)
        shell: bash
        run: |
          echo "changed=${{ steps.check.outputs.changed }}"
          echo "release_tag=${{ steps.check.outputs.release_tag }}"
          echo "semver=${{ steps.check.outputs.semver }}"
          echo "release_sha=${{ steps.check.outputs.release_sha }}"
          echo "force=${{ github.event.inputs.force }}"
          echo "event=${{ github.event_name }}"

      - name: Build and push (multi-arch)
        if: |
          steps.check.outputs.changed == 'true' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.force == true)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64

          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.check.outputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.check.outputs.semver }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.check.outputs.short_sha }}

          build-args: |
            ARTI_REPO=${{ env.UPSTREAM_CLONE_URL }}
            ARTI_REF=${{ steps.check.outputs.release_tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          labels: |
            org.opencontainers.image.title=Arti
            org.opencontainers.image.description=A Rust Tor implementation - lightweight, safe, and efficient
            org.opencontainers.image.source=https://gitlab.torproject.org/tpo/core/arti.git
            org.opencontainers.image.url=https://tpo.pages.torproject.net/core/arti/
            org.opencontainers.image.documentation=https://tpo.pages.torproject.net/core/arti/
            org.opencontainers.image.licenses=MIT OR Apache-2.0
            org.opencontainers.image.revision=${{ steps.check.outputs.release_sha }}
            org.opencontainers.image.version=${{ steps.check.outputs.semver }}

      - name: Update state file
        if: steps.check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          now="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          jq -n \
            --arg upstream_url "${UPSTREAM_REPO_URL}" \
            --arg release_tag "${{ steps.check.outputs.release_tag }}" \
            --arg release_sha "${{ steps.check.outputs.release_sha }}" \
            --arg semver "${{ steps.check.outputs.semver }}" \
            --arg built_at_utc "${now}" \
            '{
              upstream: {
                url: $upstream_url,
                project: "tpo/core/arti"
              },
              release_tag: $release_tag,
              release_sha: $release_sha,
              semver: $semver,
              built_at_utc: $built_at_utc
            }' > "${STATE_FILE}"

      - name: Commit & push updated state.json
        if: steps.check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${STATE_FILE}"

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "ci: update build state (release ${{ steps.check.outputs.release_tag }})"
          git push
